services:
  localstack:
    image: localstack/localstack:4.12.0
    ports:
      - "4568:4566" # LocalStack Gateway (remapped to avoid conflict with backend and backend-test)
      - "4710-4759:4510-4559" # external services port range
    env_file:
      - "compose/aws.env"
    environment:
      DEBUG: ${DEBUG:-1}
      LS_LOG: WARN # Localstack DEBUG Level
      SERVICES: sqs,sns
      LOCALSTACK_HOST: 127.0.0.1
    volumes:
      - "${TMPDIR:-/tmp}/localstack:/var/lib/localstack"
      - ./compose/start-localstack.sh:/etc/localstack/init/ready.d/start-localstack.sh
    healthcheck:
      test: ["CMD", "curl", "localhost:4566"]
      interval: 5s
      start_period: 5s
      retries: 3
    networks:
      - cdp-tenant

  mongodb:
    image: mongo:7.0
    networks:
      - cdp-tenant
    ports:
      - "27018:27017"
    volumes:
      - mongodb-data:/data
    restart: always

  postgres:
    image: postgis/postgis:16-3.4
    # Uncomment if you see platform mismatch warnings (e.g. on Apple Silicon Macs)
    # platform: linux/${DOCKER_DEFAULT_PLATFORM:-arm64}
    container_name: nrf-postgis
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: nrf_impact
      POSTGRES_HOST_AUTH_METHOD: trust  # No password for local dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nrf_impact"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cdp-tenant

  liquibase:
    image: liquibase/liquibase:4.27-alpine
    networks:
      - cdp-tenant
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./changelog:/liquibase/changelog
    command: --url=jdbc:postgresql://postgres:5432/nrf_impact --username=postgres --changelog-file=changelog/db.changelog.xml --defaultSchemaName=public update


  service:
    build:
      context: .
      target: development
    ports:
      - 8085:8085
    links:
      - "localstack:localstack"
      - "mongodb:mongodb"
      - "postgres:postgres"
    depends_on:
      localstack:
        condition: service_healthy
      mongodb:
        condition: service_started
      postgres:
        condition: service_healthy
    profiles:
      - service
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - "compose/aws.env"
      - "compose/secrets.env"
    environment:
      PORT: ${PORT:-8085}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://localstack:4566}
      AWS_SQS_QUEUE_URL: ${AWS_SQS_QUEUE_URL:-http://localstack:4566/000000000000/nrf-impact-assessment-jobs}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://host.docker.internal:3001}
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/}
      HOST: ${HOST:-0.0.0.0}
      DB_HOST: postgres
      DB_IAM_AUTHENTICATION: "false" # Disable IAM authentication for local development
      API_TESTING_ENABLED: "true"   # Enable API testing in development environment
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /home/nonroot/app
          ignore:
            - README.md
            - "**/*.md"
            - "**/test_*.py"
            - tests/**/*
            - .git/**/*
            - .venv/**/*
            - .pytest_cache/**/*
            - .ruff_cache/**/*
            - .vscode/**/*
            - .github/**/*
            - requirements-dev.txt
            - pytest.ini
            - .pre-commit-config.yaml
            - sonar-project.properties
            - LICENCE
        - action: rebuild
          path: ./pyproject.toml
          target: /home/nonroot/pyproject.toml
    networks:
      - cdp-tenant

volumes:
  mongodb-data:
  postgres-data:

networks:
  cdp-tenant:
    driver: bridge
