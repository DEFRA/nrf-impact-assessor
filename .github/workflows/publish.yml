name: Publish

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: "094954420758"

jobs:
  build:
    if: github.run_number != 1
    name: CDP-build-workflow
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set git hash
        run: echo "${{ github.sha }}" > .git-hash

      - name: Build and Publish
        uses: DEFRA/cdp-build-action/build@e96983a427efc87dee7923f4ffdb5b9867259239 # main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Database Schema
        uses: DEFRA/cdp-build-action/publish-db-migrations@550c4792fac07cfd59eaea469bc0a17ce202cced # main
        with:
          path: ./changelog
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Test code and Create Test Coverage Reports
        run: |
          uv sync --frozen
          uv run ruff check
          uv run pytest
