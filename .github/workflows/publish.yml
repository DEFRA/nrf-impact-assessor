name: Publish

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: "094954420758"

jobs:
  build:
    if: github.run_number != 1
    name: CDP-build-workflow
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true

      # Guard against a stale lockfile reaching main (e.g. a Dependabot merge
      # that the PR auto-lock did not catch). Runs before any step that
      # consumes uv.lock (the CDP Docker build does `uv sync --locked`).
      - name: Regenerate lockfile
        run: uv lock

      - name: Set git hash
        run: echo "${{ github.sha }}" > .git-hash

      - name: Build and Publish
        uses: DEFRA/cdp-build-action/build@e96983a427efc87dee7923f4ffdb5b9867259239 # main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Database Schema
        uses: DEFRA/cdp-build-action/publish-db-migrations@550c4792fac07cfd59eaea469bc0a17ce202cced # main
        with:
          path: ./changelog
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Test code and Create Test Coverage Reports
        run: |
          uv sync --frozen
          uv run ruff check
          uv run pytest
