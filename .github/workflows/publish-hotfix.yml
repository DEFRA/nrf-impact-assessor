name: Publish Hot Fix

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: "094954420758"

jobs:
  build:
    name: CDP-build-hotfix-workflow
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Depth 0 is required for branch-based versioning

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true

      # Guard against a stale lockfile (hotfix branches skip the PR auto-lock).
      - name: Regenerate lockfile
        run: uv lock

      - name: Test code and Create Test Coverage Reports
        run: |
          uv sync --frozen
          uv run ruff check
          uv run pytest

      - name: Publish Hot Fix
        uses: DEFRA/cdp-build-action/build-hotfix@e96983a427efc87dee7923f4ffdb5b9867259239 # main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
