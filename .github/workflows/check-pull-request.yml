name: Check Pull Request

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

jobs:
  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check Alembic / Liquibase migration parity
        run: python scripts/check_migration_parity.py

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true

      # Self-heal a stale lockfile (e.g. a Dependabot bump that did not fully
      # update uv.lock) so the checks below pass on the first run.
      - name: Regenerate lockfile
        run: uv lock

      - name: Test code and Create Test Coverage Reports
        run: |
          uv sync --frozen
          uv run ruff check
          uv run pytest

      - name: Set git hash
        run: echo "${{ github.sha }}" > .git-hash

      - name: Test Docker Image Build
        run: |
          set +e
          docker build --no-cache --tag nrf-impact-assessor .
          exit $?

      - name: Verify git hash in Docker image
        run: docker run --rm --entrypoint cat nrf-impact-assessor .git-hash
