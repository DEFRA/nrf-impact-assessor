name: Run Tests

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: "Test suite to run"
        required: true
        default: all
        type: choice
        options:
          - all
          - integration
          - regression

jobs:
  run-tests:
    name: Run ${{ inputs.test_type }} tests
    runs-on: ubuntu-latest

    services:
      postgis:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_DATABASE: nrf_impact
      DB_IAM_AUTHENTICATION: "false"
      DB_LOCAL_PASSWORD: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        uses: ./run-impact-tests
        with:
          test_type: ${{ inputs.test_type }}
